<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haiyam Email Signature</title>
</head>

<body style="margin:40px;background:#ffffff;">

<table cellpadding="0" cellspacing="0" border="0"
       style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Arial,sans-serif;
              width:520px;
              color:#111111;
              line-height:1.5;">

    <!-- Logo -->
    <tr>
        <td style="padding-bottom:28px;">
            <img
                src="https://haiyam.com/assets/haiyam-favicon.svg"
                alt="Haiyam"
                width="88"
                style="display:block;border:0;">
        </td>
    </tr>

    <!-- Name -->
    <tr>
        <td style="
            font-size:22px;
            font-weight:600;
            color:#111111;
            letter-spacing:-0.3px;">
            Your Name
        </td>
    </tr>

    <!-- Title -->
    <tr>
        <td style="
            padding-top:3px;
            font-size:14px;
            color:#6E6E73;">
            Tom Hirsh
        </td>
    </tr>

    <!-- Spacer -->
    <tr>
        <td style="height:28px;font-size:0;line-height:0;">
            &nbsp;
        </td>
    </tr>

</table>

</body>
</html>
